<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCDD Notes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="search-container">
  <input id="prompt" placeholder="What do you want to explore?" autofocus>
  <button id="search-btn">→</button>
</div>

<div id="summary"></div>
<div id="board"></div>

<!-- Chat Panel -->
<div id="chat-panel">
  <div id="chat-header">
    <span>💬 VCDD Assistant</span>
    <button id="chat-toggle" onclick="toggleChat()">−</button>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <input id="chat-input" placeholder="Ask about companies, add notes...">
    <button id="chat-send" onclick="sendChat()">↑</button>
  </div>
</div>

<!-- Note Input Modal -->
<div id="note-modal" class="note-modal">
  <div class="note-modal-content">
    <div class="note-modal-header">
      <span id="note-company-name"></span>
      <button onclick="closeNoteModal()">×</button>
    </div>
    <div id="note-existing"></div>
    <textarea id="note-input" placeholder="Add a note about this company..."></textarea>
    <button id="note-save" onclick="saveNote()">Save Note</button>
  </div>
</div>

<!-- Modal for company details -->
<div id="modal">
  <div id="modal-content">
    <button id="close-btn">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
