<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🔍 Startup Search</h1>

<input id="prompt" placeholder="e.g. show me biotech companies, or retail startups, or Series A AI...">
<button onclick="run()">Search</button>

<p id="summary" style="margin-top:10px;font-style:italic;color:#666;"></p>

<div id="board"></div>

<!-- Modal for company details -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;">
  <div id="modal-content" style="background:white;margin:10% auto;padding:30px;max-width:600px;border-radius:8px;max-height:80vh;overflow-y:auto;"></div>
</div>

<script src="frontend-config.js"></script>
<script src="script.js"></script>
</body>
</html>
